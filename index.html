<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMUTUB - Painel de Monitoramento Científico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* RESET & BASE */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: radial-gradient(circle at 50% 50%, #0d1f14 0%, #050b07 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #e2e8f0;
        }

        /* SMARTPHONE PREMIUM (ECO-CYBER) */
        .smartphone-container {
            width: 390px;
            height: 800px;
            background: #09110c;
            border-radius: 45px;
            box-shadow: 0 0 50px rgba(56, 176, 0, 0.15), inset 0 0 20px rgba(255,255,255,0.05);
            border: 10px solid #1e293b;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* GLASSMORPHISM SCREEN */
        .app-screen {
            background: linear-gradient(180deg, rgba(13, 31, 20, 0.8) 0%, rgba(5, 11, 7, 0.95) 100%);
            flex: 1;
            overflow-y: auto;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* CUSTOM SCROLLBAR */
        .app-screen::-webkit-scrollbar {
            width: 4px;
        }
        .app-screen::-webkit-scrollbar-thumb {
            background: #38b000;
            border-radius: 10px;
        }

        /* HEADER PREMIUM */
        .app-header {
            display: flex;
            flex-direction: column;
            gap: 12px;
            border-bottom: 1px solid rgba(56, 176, 0, 0.2);
            padding-bottom: 15px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand i {
            color: #38b000;
            font-size: 24px;
            animation: pulse 2s infinite;
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(90deg, #70e000, #38b000);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge-massa {
            background: rgba(56, 176, 0, 0.1);
            border: 1px solid #38b000;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            color: #70e000;
        }

        /* BOTÃO DESENVOLVEDORES */
        .btn-devs {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #94a3b8;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s;
            width: fit-content;
        }

        .btn-devs:hover {
            background: rgba(56, 176, 0, 0.1);
            border-color: #38b000;
            color: #70e000;
        }

        /* CARDS TRANSLÚCIDOS */
        .card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: rgba(56, 176, 0, 0.3);
            box-shadow: 0 5px 15px rgba(56, 176, 0, 0.05);
        }

        .card-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #94a3b8;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            color: #70e000;
        }

        /* INPUTS NUMÉRICOS */
        .input-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 10px 15px;
            border-radius: 14px;
            margin-bottom: 12px;
        }

        .input-row:focus-within {
            border-color: #38b000;
            background: rgba(56, 176, 0, 0.02);
        }

        .input-row label {
            font-size: 14px;
            color: #cbd5e1;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-num {
            width: 70px;
            background: transparent;
            border: none;
            color: #70e000;
            font-size: 18px;
            font-weight: bold;
            text-align: right;
            outline: none;
        }

        /* BOTÃO ACTION */
        .btn-action {
            width: 100%;
            background: linear-gradient(135deg, #38b000 0%, #007200 100%);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
            box-shadow: 0 4px 15px rgba(0, 114, 0, 0.4);
            transition: all 0.2s;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 176, 0, 0.6);
        }

        /* DISPLAY DE BIO-PREVISÃO */
        .prediction-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px 0;
        }

        .prediction-number {
            font-size: 38px;
            font-weight: 900;
            color: #70e000;
            text-shadow: 0 0 15px rgba(112, 224, 0, 0.4);
        }

        .prediction-label {
            font-size: 11px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        /* HISTÓRICO FUTURISTA */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feed-item {
            background: rgba(255, 255, 255, 0.01);
            border-left: 4px solid #38b000;
            border-radius: 0 14px 14px 0;
            padding: 14px;
            position: relative;
            background: linear-gradient(90deg, rgba(56, 176, 0, 0.03) 0%, transparent 100%);
            animation: fadeIn 0.4s ease-out;
        }

        .feed-item h4 {
            font-size: 13px;
            color: #70e000;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }

        .feed-item p {
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.5;
        }

        .btn-delete {
            background: transparent;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 12px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .btn-delete:hover {
            opacity: 1;
        }

        /* MODAL TRANSLÚCIDO (POPUP CRÉDITOS) */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 11, 7, 0.9);
            backdrop-filter: blur(12px);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(56, 176, 0, 0.3);
            border-radius: 28px;
            padding: 25px;
            width: 100%;
            box-shadow: 0 0 30px rgba(56, 176, 0, 0.2);
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .modal-card h2 {
            font-size: 18px;
            color: #70e000;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .dev-section {
            margin-bottom: 18px;
            text-align: left;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px 15px;
            border-radius: 14px;
            border-left: 3px solid #38b000;
        }

        .dev-section h3 {
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .dev-section p {
            font-size: 14px;
            color: #edf2f7;
            font-weight: 500;
            line-height: 1.4;
        }

        .btn-close-modal {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #cbd5e1;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.2s;
        }

        .btn-close-modal:hover {
            border-color: #ef4444;
            color: #ef4444;
            background: rgba(239, 68, 68, 0.05);
        }

        /* ANIMATIONS */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; text-shadow: 0 0 10px #38b000; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="smartphone-container">
    
    <div class="modal-overlay" id="modal-devs">
        <div class="modal-card">
            <h2><i class="fa-solid fa-users-gear"></i> Corpo Técnico</h2>
            
            <div class="dev-section">
                <h3>Desenvolvimento do App</h3>
                <p>José Victor (Programador e Designer)</p>
            </div>

            <div class="dev-section">
                <h3>Ideação</h3>
                <p>Karla Yasmim, Maria Clara, Adriely Eduarda, Maryana Barbosa, José Victor</p>
            </div>

            <button class="btn-close-modal" onclick="alternarModal(false)">FECHAR</button>
        </div>
    </div>

    <div class="app-screen">
        
        <div class="app-header">
            <div class="header-top">
                <div class="brand">
                    <i class="fa-solid fa-microchip"></i>
                    <h1>SIMUTUB</h1>
                </div>
                <div class="badge-massa"><span id="peso-total">0</span>g ativo</div>
            </div>
            <button class="btn-devs" onclick="alternarModal(true)">
                <i class="fa-solid fa-code"></i> DESENVOLVEDORES
            </button>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fa-solid fa-dna"></i> Entrada de Biomassa
            </div>
            
            <div class="input-row">
                <label><i class="fa-solid fa-tree" style="color: #b79457;"></i> Fibra de Coco</label>
                <div>
                    <input type="number" class="input-num" id="coco" value="5" min="0" oninput="calcularPrevisao()">
                    <span style="color: #64748b; font-weight: bold;">g</span>
                </div>
            </div>

            <div class="input-row">
                <label><i class="fa-solid fa-egg" style="color: #e2e8f0;"></i> Casca de Ovo</label>
                <div>
                    <input type="number" class="input-num" id="ovo" value="2" min="0" oninput="calcularPrevisao()">
                    <span style="color: #64748b; font-weight: bold;">g</span>
                </div>
            </div>

            <div class="input-row">
                <label><i class="fa-solid fa-lemon" style="color: #ffd166;"></i> Casca de Banana</label>
                <div>
                    <input type="number" class="input-num" id="banana" value="2" min="0" oninput="calcularPrevisao()">
                    <span style="color: #64748b; font-weight: bold;">g</span>
                </div>
            </div>

            <button class="btn-action" onclick="registrarTubete()">
                <i class="fa-solid fa-bolt"></i> INJETAR NO HISTÓRICO
            </button>
        </div>

        <div class="card">
            <div class="card-title">
                <i class="fa-solid fa-wand-magic-sparkles"></i> Inteligência Predictiva
            </div>
            <div class="prediction-display">
                <div class="prediction-number" id="tempo-resultado">0 Semanas</div>
                <div class="prediction-label">Tempo de integração biológica</div>
            </div>
        </div>

        <div class="card" style="flex: 1; display: flex; flex-direction: column;">
            <div class="card-title">
                <i class="fa-solid fa-server"></i> Banco de Dados Local (<span id="contador">0</span>)
            </div>
            <div class="feed-container" id="feed-lista">
                </div>
        </div>

    </div>
</div>

<script>
// Banco de dados interno
let dbTubetes = JSON.parse(localStorage.getItem('sustentatub_premium_db')) || [];

function alternarModal(abrir) {
    const modal = document.getElementById('modal-devs');
    if (abrir) {
        modal.classList.add('active');
    } else {
        modal.classList.remove('active');
    }
}

function calcularPrevisao() {
    let coco = parseFloat(document.getElementById('coco').value) || 0;
    let ovo = parseFloat(document.getElementById('ovo').value) || 0;
    let banana = parseFloat(document.getElementById('banana').value) || 0;

    let pesoTotal = coco + ovo + banana;
    document.getElementById('peso-total').innerText = pesoTotal.toFixed(1);

    let semanas = 0;
    if (pesoTotal > 0) {
        semanas = Math.round((coco * 1.6) + (ovo * 0.5) + (banana * 0.4));
        if (semanas < 3) semanas = 3; 
    }

    document.getElementById('tempo-resultado').innerText = semanas + " Semanas";
    return { coco, ovo, banana, semanas, pesoTotal };
}

function registrarTubete() {
    let dados = calcularPrevisao();
    
    if (dados.pesoTotal <= 0) {
        alert("Por favor, digite valores válidos de biomassa antes de salvar.");
        return;
    }

    let novoLote = {
        id: Date.now(),
        data: new Date().toLocaleDateString('pt-BR'),
        hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}),
        coco: dados.coco,
        ovo: dados.ovo,
        banana: dados.banana,
        semanas: dados.semanas,
        peso: dados.pesoTotal
    };

    dbTubetes.push(novoLote);
    localStorage.setItem('sustentatub_premium_db', JSON.stringify(dbTubetes));
    renderizarFeed();
}

function deletarRegistro(id) {
    dbTubetes = dbTubetes.filter(item => item.id !== id);
    localStorage.setItem('sustentatub_premium_db', JSON.stringify(dbTubetes));
    renderizarFeed();
}

function renderizarFeed() {
    let feedContainer = document.getElementById('feed-lista');
    feedContainer.innerHTML = '';
    
    document.getElementById('contador').innerText = dbTubetes.length;

    if(dbTubetes.length === 0) {
        feedContainer.innerHTML = `<p style="color:#475569; font-size:12px; text-align:center; padding: 30px; border: 1px dashed rgba(255,255,255,0.05); border-radius:14px;">Aguardando inserção de dados biológicos...</p>`;
        return;
    }

    dbTubetes.slice().reverse().forEach((tubete, index) => {
        let indiceReal = dbTubetes.length - index;
        feedContainer.innerHTML += `
            <div class="feed-item">
                <h4>
                    <span>LOTE BIODEGRADÁVEL #${indiceReal}</span>
                    <button class="btn-delete" onclick="deletarRegistro(${tubete.id})"><i class="fa-solid fa-trash-can"></i></button>
                </h4>
                <p><strong>Massa Monitorada:</strong> ${tubete.peso.toFixed(1)}g em ${tubete.data} às ${tubete.hora}</p>
                <p style="font-size: 11px; margin-top: 3px; color: #64748b;">Receita: ${tubete.coco}g coco | ${tubete.ovo}g ovo | ${tubete.banana}g banana</p>
                <p style="color:#70e000; font-weight: bold; margin-top: 5px; font-size: 11px; letter-spacing: 0.5px;">
                    <i class="fa-solid fa-hourglass-start"></i> DECOMPOSIÇÃO ESTIMADA: ${tubete.semanas} SEMANAS
                </p>
            </div>
        `;
    });
}

// Inicialização imediata
calcularPrevisao();
renderizarFeed();
</script>

</body>
</html>
